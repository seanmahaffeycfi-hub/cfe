{% extends 'base.html' %}
{% block title %}Delete Bill{% endblock %}
{% block content %}
    <h2>Delete Bill</h2>
    <p>Are you sure you want to delete <strong>{{ bill.recipient }}</strong> (${{ bill.amount }}, due {{ bill.due_date }})?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
        <a href="{% url 'bill_list' %}" class="action-link" style="margin-left:12px;">Cancel</a>
    </form>
{% endblock %}
