<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>CFE - {% block title %}Home{% endblock %}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap');
    </style>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav>
        <a href="{% url 'income_list' %}">Income</a>
        <a href="{% url 'bill_list' %}">Bills</a>
        <a href="{% url 'cashflow_view' %}">Cash Flow Table</a>
        <a href="{% url 'cashflow_by_account' %}">By Account</a>
        <div class="spacer"></div>
        <a href="{% url 'export_data' %}">Export Data</a>
        <form method="post" action="{% url 'logout' %}" style="display:inline; margin:0;">
            {% csrf_token %}
            <button type="submit" style="background:none; border:none; color:#C9BA99; cursor:pointer; padding:0; font:inherit; font-weight:600;">Log Out</button>
        </form>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
